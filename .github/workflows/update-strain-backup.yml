name: Update strain data backup

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
      timezone: 'Pacific/Auckland'

permissions:
  contents: write
  pages: write

concurrency:
  group: update-strain-data-backup
  cancel-in-progress: false

jobs:
  update-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download and validate live CSV
        id: backup
        env:
          DATA_URL: >-
            https://docs.google.com/spreadsheets/d/e/2PACX-1vSoTjN6psMidKhKOaAxqcZQQ_ArKkUTuRgn65c3ncNqjdLASER0J-Z3WYxFNuhFX_gDVoyHyH1PcCZy/pub?output=csv&gid=1070299978
        run: |
          set -euo pipefail

          mkdir -p data
          temp_file="$(mktemp)"

          curl \
            --fail \
            --show-error \
            --silent \
            --location \
            --retry 3 \
            --retry-delay 5 \
            --connect-timeout 20 \
            --max-time 120 \
            "$DATA_URL" \
            --output "$temp_file"

          python - "$temp_file" <<'PY'
          import csv
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])

          with path.open("r", encoding="utf-8-sig", newline="") as handle:
              reader = csv.DictReader(handle)
              headers = set(reader.fieldnames or [])
              required_headers = {"Strain", "Dominance", "Parent1"}
              missing = required_headers - headers

              if missing:
                  raise SystemExit(
                      "Downloaded CSV is missing required column(s): "
                      + ", ".join(sorted(missing))
                  )

              rows = [
                  row
                  for row in reader
                  if any((value or "").strip() for value in row.values())
              ]

          if len(rows) < 100:
              raise SystemExit(
                  f"Downloaded CSV has only {len(rows)} non-empty rows; refusing to replace backup."
              )

          names = [(row.get("Strain") or "").strip() for row in rows]
          if any(not name for name in names):
              raise SystemExit("Downloaded CSV contains a row without a strain name.")

          duplicate_names = sorted(
              {name for name in names if names.count(name) > 1}
          )
          if duplicate_names:
              raise SystemExit(
                  "Downloaded CSV contains duplicate strain names: "
                  + ", ".join(duplicate_names[:10])
              )

          print(f"Validated {len(rows)} non-empty strain rows.")
          PY

          if [ -f data/strain-data-backup.csv ] && \
             cmp --silent "$temp_file" data/strain-data-backup.csv; then
            rm "$temp_file"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "The live CSV is unchanged."
            exit 0
          fi

          mv "$temp_file" data/strain-data-backup.csv

          python <<'PY'
          from datetime import datetime
          from pathlib import Path
          import re
          from zoneinfo import ZoneInfo

          html_path = Path("index.html")
          html = html_path.read_text(encoding="utf-8")
          backup_date = datetime.now(ZoneInfo("Pacific/Auckland")).strftime("%-d %B %Y")

          updated_html, replacements = re.subn(
              r'backupDataDate:\s*"[^"]*"',
              f'backupDataDate: "{backup_date}"',
              html,
              count=1,
          )

          if replacements != 1:
              raise SystemExit(
                  "Could not find exactly one backupDataDate setting in index.html."
              )

          html_path.write_text(updated_html, encoding="utf-8")
          print(f"Updated backup date to {backup_date}.")
          PY

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated backup
        if: steps.backup.outputs.changed == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/strain-data-backup.csv index.html
          git commit -m "Update strain data backup"
          git push

      - name: Request GitHub Pages rebuild
        if: steps.backup.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/pages/builds"
